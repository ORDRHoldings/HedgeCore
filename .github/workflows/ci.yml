name: CI

on:
  push:
    branches: [master, dev, "hardening/**", "feat/**", "fix/**"]
  pull_request:
    branches: [master, dev]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: python -m ruff check app/

      - name: Mypy type check
        run: python -m mypy app/ --config-file mypy.ini
        continue-on-error: true   # mypy baseline — harden progressively

      - name: Pytest
        run: python -m pytest tests/ -x -q --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret-32-chars-minimum-ok"
          ENV: "test"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: "https://hedgecore.onrender.com/api"

  # ── Docker build (backend) ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ordr-backend:ci ./backend
