name: CI

on:
  push:
    branches: [master, dev, "hardening/**", "feat/**", "fix/**"]
  pull_request:
    branches: [master, dev]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: python -m ruff check app/

      - name: Mypy type check
        run: python -m mypy app/ --config-file mypy.ini
        continue-on-error: true   # mypy baseline — harden progressively

      - name: Install coverage deps
        run: pip install pytest-cov

      - name: Pytest with coverage
        run: >
          python -m pytest tests/ -x -q --tb=short
          --cov=app --cov-report=term-missing
          --cov-fail-under=40
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret-32-chars-minimum-ok"
          ENV: "test"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Contrast check
        run: node scripts/check-contrast.mjs

      - name: Next.js build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: "https://hedgecore.onrender.com/api"

  # ── E2E (Playwright) ─────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: "https://hedgecore.onrender.com/api"

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: "http://localhost:3000"
          E2E_USER: "demo"
          E2E_PASS: "demo"

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Architecture Governance ──────────────────────────────────────────────────
  governance:
    name: Architecture Governance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Freeze check
        run: python scripts/freeze_check_precommit.py

      - name: Pre-merge gate
        run: python scripts/pre_merge_gate.py

      - name: Risk gate
        run: python scripts/ci_risk_gate.py

  # ── Docker build (backend) ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ordr-backend:ci ./backend

  # ── Security scan ─────────────────────────────────────────────────────────────
  security:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2   # tracks latest v2.x — not SHA-pinned (consistent with rest of ci.yml)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
