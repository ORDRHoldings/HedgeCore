name: CI

on:
  push:
    branches: [master, dev, "hardening/**", "feat/**", "fix/**"]
  pull_request:
    branches: [master, dev]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Alembic migration integrity
        run: |
          python -m alembic heads
          python -m alembic history --verbose

      - name: Ruff lint
        run: python -m ruff check app/

      - name: Mypy type check (full codebase — advisory)
        run: python -m mypy app/ --config-file mypy.ini
        continue-on-error: true

      - name: Mypy strict gate (engine_v1 only — HARD GATE)
        run: python -m mypy app/engine_v1/ --config-file mypy.ini --strict --no-error-summary --explicit-package-bases

      - name: Install coverage deps
        run: pip install pytest-cov

      - name: Pytest with coverage
        run: >
          python -m pytest tests/ -x -q --tb=short
          --cov=app --cov-report=term-missing
          --cov-fail-under=70   # 2026-05-16: ratcheted 60→70 after sustained 75% measured
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "ci-test-secret-32-chars-minimum-ok"
          ENV: "test"
          SENTRY_DSN: ""

  # ── Backend Postgres-only tests ──────────────────────────────────────────────
  # Closes RISK-CI-PG-01: 130 requires_postgres-marked tests were dead in CI
  # because the main backend job runs against SQLite. The 2026-05-16 RLS
  # incident (set_config fix) is the textbook case this job exists to catch:
  # a production bug that only surfaces against a real PostgreSQL driver.
  #
  # continue-on-error: true keeps this advisory while we audit which of the
  # 130 PG-only tests need fixture/schema work. Flip to false once the suite
  # is reliably green — that promotion is itself a launch-readiness milestone.
  backend-postgres:
    name: Backend Postgres tests (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hedge_test
          POSTGRES_PASSWORD: hedge_test
          POSTGRES_DB: hedge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hedge_test -d hedge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Bootstrap schema in the same sequence production uses (see
      # RISK-CI-PG-02): run alembic non-fatally so any clean migrations apply,
      # then `_ensure_tables()` fills in ORM-only tables that the chain never
      # creates (positions, execution_proposals, policy_instances, …), then
      # stamp alembic to head so version tracking is consistent. Production's
      # `run_alembic_upgrade()` swallows exceptions per `app/core/db_migrations.py`
      # lines 63–66 and `_ensure_tables()` runs next as the schema safety net.
      # Mirroring that exact sequence here is more reliable than expecting
      # alembic-in-isolation to succeed.
      - name: Bootstrap schema (production-mirror sequence)
        run: |
          set +e
          python -m alembic upgrade head
          ALEMBIC_EXIT=$?
          set -e
          echo "alembic upgrade head exit=$ALEMBIC_EXIT (non-fatal — production parity)"
          python -c "import asyncio; from app.main import _ensure_tables; asyncio.run(_ensure_tables())"
          python -m alembic stamp head
        env:
          DATABASE_URL: "postgresql+asyncpg://hedge_test:hedge_test@localhost:5432/hedge_test"
          JWT_SECRET: "ci-test-secret-32-chars-minimum-ok"
          ENV: "test"

      - name: Run requires_postgres tests
        run: python -m pytest tests/ -m requires_postgres -q --tb=short
        env:
          DATABASE_URL: "postgresql+asyncpg://hedge_test:hedge_test@localhost:5432/hedge_test"
          JWT_SECRET: "ci-test-secret-32-chars-minimum-ok"
          ENV: "test"
          SENTRY_DSN: ""

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Contrast check
        run: node scripts/check-contrast.mjs

      # Structural defense for two regression classes:
      #   (a) Broken router.push / href targets — see later13 (/positions →
      #       404 because canonical is /position-desk).
      #   (b) Auth-guard hydration race — see later14 (Trade History bounced
      #       authenticated users back to /auth/login because guard fired
      #       before AuthProvider hydrated).
      # The script auto-detects both classes from source. Hard gate from
      # day one because the codebase is already clean (verified 2026-05-27).
      - name: Frontend route + auth-guard audit
        run: python scripts/find_broken_hrefs.py
        working-directory: ${{ github.workspace }}

      - name: Next.js build
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: "https://hedgecore.onrender.com/api"

  # ── E2E (Playwright) ─────────────────────────────────────────────────────────
  # Opens RISK-CI-E2E-01: the 237-test E2E suite has not actually run end-to-end
  # in CI since before 2026-05-13 — a broken helper import path
  # ('../../helpers/auth' in e2e/accounting/*.spec.ts) short-circuited every
  # run with a fast failure. Fixing that path (commit 54c3559) exposed that
  # the suite then hangs past the runner window — tests target the live
  # hedgecore.onrender.com backend and the suite as written cannot complete
  # in the available time. Demoted to continue-on-error: true while the suite
  # is audited (separate work item — same pattern as backend-postgres).
  # Flipping back to a hard gate is a launch-readiness milestone.
  e2e:
    name: E2E (Playwright) (advisory)
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    continue-on-error: true

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: "https://hedgecore.onrender.com/api"

      - name: Run E2E tests
        # Step-level timeout + continue-on-error so a timeout becomes a step
        # failure (which the job's continue-on-error swallows) rather than a
        # job cancellation. Job-level timeout-minutes converts to "cancelled",
        # which poisons the overall workflow result regardless of
        # continue-on-error. See RISK-CI-E2E-01.
        timeout-minutes: 20
        continue-on-error: true
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: "http://localhost:3000"
          E2E_USER: "demo"
          E2E_PASS: "demo"

      - name: Upload E2E report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── E2E Smoke (Playwright, fast subset) ──────────────────────────────────────
  # Companion to the full `e2e` job (RISK-CI-E2E-01). The smoke Playwright
  # project (`frontend/playwright.config.ts`) runs only nav-smoke (per-route
  # page-paint) + full-journey (login → hedge desk → report → logout) — small
  # enough to finish well under the 20-min window. Kept advisory until N
  # consecutive green runs prove stability; promotion to hard gate is a
  # launch-readiness milestone tracked alongside the full e2e job.
  e2e-smoke:
    name: E2E Smoke (Playwright) (advisory)
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    continue-on-error: true

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: "https://hedgecore.onrender.com/api"

      - name: Run E2E smoke tests
        timeout-minutes: 10
        continue-on-error: true
        run: npx playwright test --project=smoke
        env:
          E2E_BASE_URL: "http://localhost:3000"
          E2E_USER: "demo"
          E2E_PASS: "demo"

      - name: Upload smoke report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Architecture Governance ──────────────────────────────────────────────────
  governance:
    name: Architecture Governance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Freeze check
        run: python scripts/freeze_check_precommit.py

      - name: Pre-merge gate
        run: python scripts/pre_merge_gate.py

      - name: Risk gate
        run: python scripts/ci_risk_gate.py

  # ── Docker build (backend) ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        # Dockerfile uses repo-root paths (`COPY backend/...`), so the build
        # context must be the repo root — matching docker-compose.yml.
        run: docker build -f backend/Dockerfile -t ordr-backend:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ordr-backend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  # ── Security scan ─────────────────────────────────────────────────────────────
  security:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history required for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2   # tracks latest v2.x — not SHA-pinned (consistent with rest of ci.yml)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Frontend production deploy (Vercel) ──────────────────────────────────────
  # Replaces Vercel's native Git integration, which broke when the GitHub repo
  # was transferred Synexiun → ORDRHoldings: the transfer changed the repo
  # namespace while Vercel's project link (and its GitHub App OAuth grant) stayed
  # bound to the old `Synexiun` namespace, so master pushes stopped auto-deploying
  # and even the repoId-keyed deploy hook returns `incorrect_git_source_info`.
  #
  # This job deploys via the Vercel CLI keyed by the immutable org/project IDs
  # (VERCEL_ORG_ID / VERCEL_PROJECT_ID), so it is independent of the GitHub↔Vercel
  # OAuth link and survives future repo/namespace moves. Vercel builds the upload
  # server-side using the project's own production env (incl. NEXT_PUBLIC_API_URL)
  # and rootDirectory=frontend — identical to how the native Git integration built,
  # so output parity is exact.
  #
  # NOTE: we use a server-side `vercel deploy` (not local `vercel build --prebuilt`).
  # The local prebuilt packaging step trips a @vercel/next bug on this app
  # ("Unable to find lambda for route: /audit-lab/audit-trail"); building on
  # Vercel's infra avoids it. The repo-root .vercelignore scopes the upload to
  # the frontend (rootDirectory), keeping backend/tests/etc. out of the bundle.
  #
  # ONE-TIME SETUP (ops): add a Vercel access token as the `VERCEL_TOKEN` repo
  # secret —  gh secret set VERCEL_TOKEN  (or GitHub UI → Settings → Secrets).
  # Org/project IDs are non-secret (they live in frontend/.vercel/project.json).
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: team_uQ9iUgSSC8m05t2W2iXwt5WM
      VERCEL_PROJECT_ID: prj_oSjdLZdWu9OB54ib8WKGjGndT3U8

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to production (Vercel server-side build)
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
