# render.yaml — Infrastructure-as-Code for Render.com
# Two environments: production (master branch) + preview (dev branch)
#
# SETUP INSTRUCTIONS:
# 1. In Render dashboard → New → Blueprint → connect this repo
# 2. Create two "Env Groups" in Render:
#    - hedgecore-secrets          (production DB + JWT_SECRET + API keys)
#    - hedgecore-preview-secrets  (preview DB + JWT_SECRET)
# 3. Render will auto-create both services + both databases from this file
#
# WORKFLOW:
#   master branch → hedgecore service       (production, stable)
#   dev branch    → hedgecore-preview service (safe to break, separate DB)
#
# CLI AUTOMATION:
#   See docs/ops/render-cli.md and scripts/render/ for scripted workflows.

services:
  # Both services upgraded to starter tier — eliminates cold starts and enables
  # private networking between web services and databases.

  # ── Production Backend (master branch) ──────────────────────────────────────
  - type: web
    name: hedgecore
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    branch: master
    plan: starter
    healthCheckPath: /api/health
    # Only rebuild on backend changes — skip frontend/docs-only pushes
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - frontend/**
        - docs/**
        - "*.md"
        - scripts/**
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      - key: JWT_SECRET
        fromGroup: hedgecore-secrets
      # PRIVATE NETWORKING: use the internal database URL from the Render dashboard
      # (format: postgresql://user:PASSWORD@dpg-XXXX-a/db) — removes DB from public internet
      - key: DATABASE_URL
        fromGroup: hedgecore-secrets
      - key: ASYNC_DATABASE_URL
        fromGroup: hedgecore-secrets
      - key: CORS_ALLOW_ORIGINS
        value: '["https://hedgecore.vercel.app","https://ordr-terminal.vercel.app","https://ordr-terminal-v2.vercel.app","https://ordr-market.vercel.app","https://ordr-market-git-master-synexiun.vercel.app","https://ordr-market-synexiun.vercel.app","https://ordr-market-synexiun-projects.vercel.app"]'
      - key: ANTHROPIC_API_KEY
        fromGroup: hedgecore-secrets
      - key: VOICE_CLAUDE_MODEL
        value: "claude-sonnet-4-6"
      - key: FINNHUB_API_KEY
        fromGroup: hedgecore-secrets
      - key: ALLOW_INDICATIVE_FALLBACK
        value: "false"
      - key: SYNEX_CORE_URL
        value: https://synex-core.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: hedgecore-redis
          property: connectionString
      - key: SENTRY_DSN
        fromGroup: hedgecore-secrets

  # ── Preview Backend (dev branch) ────────────────────────────────────────────
  - type: web
    name: hedgecore-preview
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    branch: dev
    plan: starter
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - frontend/**
        - docs/**
        - "*.md"
    envVars:
      - key: ENV
        value: preview
      - key: PYTHON_VERSION
        value: "3.12"
      - key: JWT_SECRET
        fromGroup: hedgecore-preview-secrets
      # PRIVATE NETWORKING: use the internal database URL from the Render dashboard
      # (format: postgresql://user:PASSWORD@dpg-XXXX-a/db) — removes DB from public internet
      - key: DATABASE_URL
        fromGroup: hedgecore-preview-secrets
      - key: ASYNC_DATABASE_URL
        fromGroup: hedgecore-preview-secrets
      - key: CORS_ALLOW_ORIGINS
        value: '["http://localhost:3000","http://127.0.0.1:3000","https://hedgecore-git-dev-synexiun-projects.vercel.app"]'
        # TODO: move to fromGroup: hedgecore-preview-secrets once the key is set in Render dashboard
      - key: ALLOW_INDICATIVE_FALLBACK
        value: "true"
      - key: SYNEX_CORE_URL
        value: https://synex-core.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: hedgecore-preview-redis
          property: connectionString
      - key: SENTRY_DSN
        fromGroup: hedgecore-preview-secrets

  # ── Redis (rate limiting + market data cache) ────────────────────────────────
  # Render Redis on Starter plan — 25MB RAM, persistent, private network only
  - type: redis
    name: hedgecore-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  - type: redis
    name: hedgecore-preview-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  # ── Keep-alive cron (RISK-INF-01 mitigation) ────────────────────────────────
  # Pings the production backend every 14 minutes to prevent free-tier cold starts.
  # Free-tier services sleep after ~15 min inactivity; this keeps hedgecore warm.
  - type: cron
    name: hedgecore-keepalive
    runtime: python
    schedule: "*/14 * * * *"
    buildCommand: pip install requests
    startCommand: >
      python -c "
      import requests, sys;
      r = requests.get('https://hedgecore.onrender.com/api/health', timeout=10);
      print(r.status_code, r.text[:80]);
      sys.exit(0 if r.ok else 1)
      "
    plan: free

  # ── Daily backup cron (02:00 UTC) ────────────────────────────────────────────
  - type: cron
    name: hedgecore-backup-daily
    runtime: docker
    dockerfilePath: scripts/backup/Dockerfile.backup
    schedule: "0 2 * * *"
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromGroup: hedgecore-secrets
      - key: B2_ACCOUNT_ID
        fromGroup: hedgecore-secrets
      - key: B2_APP_KEY
        fromGroup: hedgecore-secrets
      - key: B2_BUCKET
        fromGroup: hedgecore-secrets
      - key: SENTRY_DSN
        fromGroup: hedgecore-secrets

  # ── Monthly restore verification (01:00 UTC on 1st of month) ────────────────
  - type: cron
    name: hedgecore-restore-verify-monthly
    runtime: docker
    dockerfilePath: scripts/backup/Dockerfile.backup
    schedule: "0 1 1 * *"
    plan: starter
    envVars:
      - key: VERIFY_DB_URL
        fromGroup: hedgecore-secrets
      - key: B2_ACCOUNT_ID
        fromGroup: hedgecore-secrets
      - key: B2_APP_KEY
        fromGroup: hedgecore-secrets
      - key: B2_BUCKET
        fromGroup: hedgecore-secrets
      - key: SENTRY_DSN
        fromGroup: hedgecore-secrets

databases:
  # ── Production Database ──────────────────────────────────────────────────────
  - name: hedgecore-db
    databaseName: hedgecalc
    user: hedgecalc
    plan: starter

  # ── Preview Database (separate — safe to wipe/reseed) ───────────────────────
  - name: hedgecore-preview-db
    databaseName: hedgecalc_preview
    user: hedgecalc_preview
    plan: starter
