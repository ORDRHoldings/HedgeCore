# render.yaml — Infrastructure-as-Code for Render.com
# Two environments: production (master branch) + preview (dev branch)
#
# SETUP INSTRUCTIONS:
# 1. In Render dashboard → New → Blueprint → connect this repo
# 2. Create two "Env Groups" in Render:
#    - hedgecore-secrets          (production DB + JWT_SECRET + API keys)
#    - hedgecore-preview-secrets  (preview DB + JWT_SECRET)
# 3. Render will auto-create both services + both databases from this file
#
# WORKFLOW:
#   master branch → hedgecore service       (production, stable)
#   dev branch    → hedgecore-preview service (safe to break, separate DB)
#
# CLI AUTOMATION:
#   See docs/ops/render-cli.md and scripts/render/ for scripted workflows.

services:
  # ── Production Backend (master branch) ──────────────────────────────────────
  - type: web
    name: hedgecore
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    branch: master
    plan: free
    healthCheckPath: /api/health
    # Only rebuild on backend changes — skip frontend/docs-only pushes
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - frontend/**
        - docs/**
        - "*.md"
        - scripts/**
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      - key: JWT_SECRET
        fromGroup: hedgecore-secrets
      - key: DATABASE_URL
        fromGroup: hedgecore-secrets
      - key: ASYNC_DATABASE_URL
        fromGroup: hedgecore-secrets
      - key: CORS_ALLOW_ORIGINS
        value: '["https://hedgecore.vercel.app","https://ordr-terminal.vercel.app","https://ordr-terminal-v2.vercel.app"]'
      - key: ANTHROPIC_API_KEY
        fromGroup: hedgecore-secrets
      - key: VOICE_CLAUDE_MODEL
        value: "claude-sonnet-4-6"
      - key: FINNHUB_API_KEY
        fromGroup: hedgecore-secrets
      - key: ALLOW_INDICATIVE_FALLBACK
        value: "false"

  # ── Preview Backend (dev branch) ────────────────────────────────────────────
  - type: web
    name: hedgecore-preview
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    branch: dev
    plan: free
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - frontend/**
        - docs/**
        - "*.md"
    envVars:
      - key: ENV
        value: preview
      - key: PYTHON_VERSION
        value: "3.12"
      - key: JWT_SECRET
        fromGroup: hedgecore-preview-secrets
      - key: DATABASE_URL
        fromGroup: hedgecore-preview-secrets
      - key: ASYNC_DATABASE_URL
        fromGroup: hedgecore-preview-secrets
      - key: CORS_ALLOW_ORIGINS
        value: '["http://localhost:3000","http://127.0.0.1:3000","https://hedgecore-git-dev-synexiun-projects.vercel.app"]'
      - key: ALLOW_INDICATIVE_FALLBACK
        value: "true"

databases:
  # ── Production Database ──────────────────────────────────────────────────────
  - name: hedgecore-db
    databaseName: hedgecalc
    user: hedgecalc
    plan: free

  # ── Preview Database (separate — safe to wipe/reseed) ───────────────────────
  - name: hedgecore-preview-db
    databaseName: hedgecalc_preview
    user: hedgecalc_preview
    plan: free
