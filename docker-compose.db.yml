version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hedgecalc
      POSTGRES_PASSWORD: ***REDACTED_DB_PASSWORD***
      POSTGRES_DB: hedgecalc
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
