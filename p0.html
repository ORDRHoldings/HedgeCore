<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HedgeCalc &#8212; Enterprise Product Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0E12;--bg2:#0F1419;--bg3:#141C24;--bg4:#1A2332;--border:#1E2D3D;--border2:#2A3F55;--cyan:#00C2FF;--blue:#2563EB;--blue2:#1D4ED8;--amber:#F59E0B;--green:#10B981;--red:#EF4444;--text:#E2E8F0;--text2:#94A3B8;--text3:#64748B;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--serif:'IBM Plex Serif',serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6}
nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,14,18,0.96);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:1000;backdrop-filter:blur(12px)}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.1em;color:var(--text)}
.nav-logo span{color:var(--cyan)}
.nav-links{display:flex;gap:32px}
.nav-links a{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text2);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--cyan)}
.nav-badge{font-family:var(--mono);font-size:10px;color:var(--text3);border:1px solid var(--border);padding:3px 10px;border-radius:2px}
.hero{min-height:100vh;display:flex;align-items:center;padding:100px 80px 80px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 50%,rgba(37,99,235,.08) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(0,194,255,.05) 0%,transparent 60%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(30,45,61,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(30,45,61,.4) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%)}
.hero-content{position:relative;max-width:720px}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:24px}
.hero-tag::before{content:"";display:block;width:24px;height:1px;background:var(--cyan)}
.hero h1{font-family:var(--serif);font-size:clamp(40px,5vw,64px);font-weight:500;line-height:1.1;color:var(--text);margin-bottom:20px;letter-spacing:-.02em}
.hero h1 em{font-style:normal;color:var(--cyan)}
.hero-sub{font-family:var(--mono);font-size:16px;color:var(--text2);margin-bottom:40px;letter-spacing:.02em}
.hero-stats{display:flex;gap:24px;margin-bottom:48px;flex-wrap:wrap}
.stat-badge{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);padding:10px 16px;border-radius:3px}
.stat-badge .num{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--cyan)}
.stat-badge .label{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.hero-cta{display:inline-flex;align-items:center;gap:10px;background:var(--blue);color:white;font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.05em;padding:14px 28px;border-radius:3px;text-decoration:none;transition:background .2s}
.hero-cta:hover{background:var(--blue2)}
.hero-terminal{position:absolute;right:80px;top:50%;transform:translateY(-50%);width:520px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(0,194,255,.08)}
.terminal-bar{background:var(--bg4);padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.terminal-dots{display:flex;gap:6px}
.terminal-dots span{width:10px;height:10px;border-radius:50%}
.dot-r{background:#FF5F57}
.dot-y{background:#FEBC2E}
.dot-g{background:#28C840}
.terminal-title{flex:1;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)}
.terminal-body{padding:20px;font-family:var(--mono);font-size:12px;line-height:1.8}
.t-line{display:flex;justify-content:space-between;margin-bottom:2px}
.t-key{color:var(--text3)}
.t-val{color:var(--text);font-weight:500}
.t-val.cyan{color:var(--cyan)}
.t-val.green{color:var(--green)}
.t-val.amber{color:var(--amber)}
.t-val.red{color:var(--red)}
.t-divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.t-section{color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;margin-top:14px}
section{padding:100px 80px}
section:nth-child(even){background:var(--bg2)}
.section-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-tag::after{content:"";flex:1;max-width:60px;height:1px;background:var(--border2)}
h2{font-family:var(--serif);font-size:40px;font-weight:500;color:var(--text);margin-bottom:16px;letter-spacing:-.02em}
.section-lead{font-size:17px;color:var(--text2);max-width:640px;margin-bottom:60px;line-height:1.7}
.overview-grid{display:grid;grid-template-columns:1fr 380px;gap:60px;align-items:start}
.overview-text p{color:var(--text2);line-height:1.8;margin-bottom:20px;font-size:16px}
.overview-text strong{color:var(--text)}
.key-facts{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:24px}
.key-facts h4{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fact-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px}
.fact-row:last-child{border-bottom:none}
.fact-key{color:var(--text3)}
.fact-val{color:var(--text);font-weight:500}
.fact-val.cyan{color:var(--cyan)}
.fact-val.green{color:var(--green)}
.modules-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px}
.module-card{background:var(--bg3);padding:40px;border:1px solid var(--border);transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.module-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--border2);transition:background .2s}
.module-card:hover{background:var(--bg4)}
.module-card:hover::before{background:var(--cyan)}
.module-icon{font-size:28px;margin-bottom:20px;display:block}
.module-name{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.06em;color:var(--cyan);text-transform:uppercase;margin-bottom:12px}
.module-desc{color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:20px}
.module-stat{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:2px;letter-spacing:.06em}
