# ============================================================
#   ALEMBIC CONFIGURATION – HEDGECALC BACKEND
#   Environment: Dev (PostgreSQL 16)
#   Purpose: Database versioning and migration management
# ============================================================

[alembic]
# Path to migration scripts (auto-created by Alembic)
script_location = %(here)s/migrations

# File naming pattern for revisions
# file_template = %%(rev)s_%%(slug)s

# Add backend directory to sys.path for module resolution
prepend_sys_path = .

# Use OS-specific path separator
path_separator = os

# ============================================================
#   DATABASE CONNECTION
# ============================================================

# Direct connection to HedgeCalc PostgreSQL (Dockerized)
sqlalchemy.url = postgresql+psycopg2://hedgecalc:hedgecalc_pw@127.0.0.1:5432/hedgecalc

# ============================================================
#   LOGGING
# ============================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# ============================================================
#   POST-WRITE HOOKS (Optional)
# ============================================================

[post_write_hooks]
# Example:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME
