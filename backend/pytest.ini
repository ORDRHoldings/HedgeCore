[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage settings (requires pytest-cov)
# Run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60
addopts =
    -x
    -q
    --tb=short
