[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage settings (requires pytest-cov)
# CI enforces --cov-fail-under=70 (see .github/workflows/ci.yml).
# Local run: pytest --cov=app --cov-report=term-missing --cov-fail-under=70
addopts =
    -x
    -q
    --tb=short
