# ruff.toml — ORDR Terminal Backend
line-length = 100
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",  # line too long
    "B008",  # FastAPI Depends pattern
    "E402",  # module-level import not at top — many conditional imports in codebase
    "B904",  # raise from — structural change, deferred
    "B007",  # loop control variable not used in loop body — minor, deferred
    "F841",  # unused local variable — minor, deferred
]

[lint.isort]
known-first-party = ["app"]
