<!DOCTYPE html>
<html>
  <head>
    <title>HedgeCalc API - Swagger UI</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" type="text/css"
      href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4.19.1/swagger-ui.css" />
    <link rel="shortcut icon" href="https://fastapi.tiangolo.com/img/favicon.png">
    <style>
      body { margin:0; padding:0; }
      .topbar { background-color:#0d1b2a !important; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4.19.1/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@4.19.1/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function() {
        const ui = SwaggerUIBundle({
          url: '/openapi.json',
          dom_id: '#swagger-ui',
          deepLinking: true,
          layout: "BaseLayout",
          showExtensions: true,
          showCommonExtensions: true,
          displayRequestDuration: true,
          persistAuthorization: true,
          tryItOutEnabled: true,
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
          ],
        });
        window.ui = ui;
      };
    </script>
  </body>
</html>
