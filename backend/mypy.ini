[mypy]
python_version = 3.12
strict = false
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true

# Third-party stubs — ignore missing
[mypy-sqlalchemy.*]
ignore_missing_imports = true

[mypy-fastapi.*]
ignore_missing_imports = true

[mypy-pydantic.*]
ignore_missing_imports = true

[mypy-jwt.*]
ignore_missing_imports = true

[mypy-bcrypt.*]
ignore_missing_imports = true

[mypy-slowapi.*]
ignore_missing_imports = true
