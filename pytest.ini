[pytest]
# ===========================================================
# HedgeCalc Enterprise Test Configuration
# Phase IV: Async Stability + Loop Control
# ===========================================================

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
asyncio_default_test_loop_scope = function

# Test discovery
testpaths =
    backend/tests
python_files =
    test_*.py
python_classes =
    Test*
python_functions =
    test_*

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] [%(name)s] %(message)s
log_file = LOG/backend_tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] [%(name)s] %(message)s

# Warning filters (only valid Warning subclasses)
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestDeprecationWarning
    ignore::sqlalchemy.exc.SADeprecationWarning
    ignore:coroutine '.*' was never awaited

# Coverage / test behavior
addopts =
    --maxfail=3
    --disable-warnings
    --tb=short
    -v
